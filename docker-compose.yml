services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clargate
      POSTGRES_PASSWORD: clargate_dev
      POSTGRES_DB: clargate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clargate"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/clargate-documents --ignore-existing;
      mc anonymous set none local/clargate-documents;
      exit 0;
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://clargate:clargate_dev@postgres:5432/clargate
      DATABASE_URL_SYNC: postgresql://clargate:clargate_dev@postgres:5432/clargate
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET_NAME: clargate-documents
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-dev}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-dev-jwt-secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  pgdata:
  miniodata:
