<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;padding:0;background:#f4f4f5">
  <div style="max-width:600px;margin:40px auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)">
    <div style="background:#1e293b;padding:32px 24px;text-align:center">
      <h1 style="color:#fff;margin:0;font-size:24px">Clargate</h1>
    </div>
    <div style="padding:32px 24px">
      <h2 style="color:#1e293b;margin:0 0 16px">Revisions Requested</h2>
      <p style="color:#475569;line-height:1.6">Dear {{ pi_name }},</p>
      <p style="color:#475569;line-height:1.6">Revisions have been requested for your proposal <strong>"{{ proposal_title }}"</strong>.</p>
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:16px;margin:16px 0">
        {{ letter_content | safe }}
      </div>
      <p style="color:#475569;line-height:1.6">Please log in to your Clargate dashboard to review the detailed revision letter and resubmit your proposal.</p>
      <p style="color:#475569;line-height:1.6;margin-top:24px">Best regards,<br>The Clargate Team</p>
    </div>
  </div>
</body>
</html>
