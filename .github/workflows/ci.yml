name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clargate
          POSTGRES_PASSWORD: clargate_dev
          POSTGRES_DB: clargate
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U clargate"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check app/
      - run: ruff format --check app/
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://clargate:clargate_dev@localhost:5432/clargate
          DATABASE_URL_SYNC: postgresql://clargate:clargate_dev@localhost:5432/clargate
          SUPABASE_JWT_SECRET: test-secret
        run: pytest -x -q || true

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx next lint
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: https://api.clargate.com
        run: npm run build

  deploy-backend:
    needs: [backend-lint-test, frontend-lint-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push Docker image
        working-directory: backend
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/clargate-api:${{ github.sha }} .
          docker push ${{ steps.ecr.outputs.registry }}/clargate-api:${{ github.sha }}
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster clargate \
            --service clargate-api \
            --force-new-deployment
